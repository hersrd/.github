name: "Bug Report"
description: "Report a bug to help us identify and fix issues."
type: "Bug"
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: "Describe the Bug"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Actual Behavior"
      description: "A clear and concise description of what actually happened."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Screenshots"
      description: "If applicable, add screenshots to help explain the problem."

  - type: textarea
    attributes:
      label: "Additional Context"
      description: "Add any other context about the problem here, such as environment details, logs, or related issues."
