name: "Story"
description: "Create a user story issue to describe a feature or enhancement from the user's perspective."
type: "Feature"
body:
  - type: textarea
    attributes:
      label: "Requirements"
      value: |
        - [ ] First requirement
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Acceptance Criteria"
      value: |
        - [ ] First criteria
    validations:
      required: true
